name: speedrun

on: # yamllint disable-line rule:truthy
    workflow_dispatch:
        inputs:
            MEASLES_TABR:
                description: Measles TAg or BRanch
                required: false
    push:
        branches:
            - main
    pull_request:

jobs:
    speedrun:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash --noprofile --norc -o errexit -o nounset -o pipefail -o xtrace {0}
        steps:
            - uses: actions/checkout@v6

            - uses: jdx/mise-action@v3
              with:
                  experimental: true

            - name: Fetch and run Measles bootstrap commands
              run: |
                  curl -fsSL \
                      "https://raw.githubusercontent.com/biobuddies/measles/"\
                      "${{ inputs.MEASLES_TABR || 'main' }}/README.md" \
                      | sed -n "/^\`\`\`bash\$/,/^\`\`\`\$/ { /^\`\`\`/d; p; }" \
                      | bash --noprofile --norc -o errexit -o nounset -o pipefail -o xtrace

            - run: mise pre-commit

            - run: mise test
